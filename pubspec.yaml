name: moeen_app
description: "A new Flutter project."


publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.10.4


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  rename: ^3.1.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4


flutter:


  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/appLogo.png"
  min_sdk_android: 21

  adaptive_icon_background: "#fffff6"    
  adaptive_icon_foreground: "assets/images/appLogo.png"
  adaptive_icon_foreground_inset: 0
  web:
    generate: true
    image_path: "assets/images/appLogo.png"
    background_color: "#fffff6"
    theme_color: "#2196f3"
  windows:
    generate: true
    image_path: "assets/images/appLogo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/appLogo.png"